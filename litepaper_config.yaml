# LitePaperReader Configuration
# Environment variables take precedence over this file.
# Set LITEPAPER_API_KEY to enable DeepSeek / OpenAI mode.

pipeline:
  extraction_mode: mock   # mock | deepseek | ollama | instructor | json
  model: deepseek-chat
  api_base: https://api.deepseek.com/v1
  # api_key: sk-...       # Prefer environment variable LITEPAPER_API_KEY

  size_threshold: 10000    # chars; files below this pass through raw

  default_template_id: auto_generic

  include_extensions:
    - .html
    - .htm
    - .txt
    - .md
    - .csv
    - .xlsx
    - .py
    - .js
    - .ts
    - .rs
    - .go
    - .java
    - .pdf

  db_path: litepaper_auto.db
  watch_dir: ~
