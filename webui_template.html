<!-- LitePaperReader Web UI - Extended Version with Upload, Custom 提取模板, 管道 Animation -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LitePaperReader 数据流引擎</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f8f9fa; color: #1a1a2e; }
  .header { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); color: #fff; padding: 20px 32px; display: flex; justify-content: space-between; align-items: center; }
  .header h1 { font-size: 20px; font-weight: 600; }
  .header p { font-size: 13px; opacity: 0.7; margin-top: 4px; }
  .tabs { display: flex; gap: 0; background: #e9ecef; border-radius: 8px 8px 0 0; overflow: hidden; }
  .tab { padding: 10px 24px; font-size: 13px; font-weight: 500; cursor: pointer; background: #e9ecef; color: #495057; border: none; border-bottom: 2px solid transparent; }
  .tab.active { background: #fff; color: #0066cc; border-bottom-color: #0066cc; }
  .tab-content { display: none; }
  .tab-content.active { display: block; }
  .container { max-width: 1200px; margin: 0 auto; padding: 0 24px 24px; display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
  .panel { background: #fff; border-radius: 0 0 8px 8px; border: 1px solid #e9ecef; border-top: none; padding: 20px; }
  .panel h2 { font-size: 15px; font-weight: 600; margin-bottom: 16px; color: #495057; text-transform: uppercase; letter-spacing: .5px; }
  textarea { width: 100%; height: 200px; border: 1px solid #dee2e6; border-radius: 6px; padding: 12px; font-size: 14px; font-family: "SF Mono", Monaco, monospace; resize: vertical; margin-bottom: 12px; }
  textarea:focus { outline: none; border-color: #0066cc; box-shadow: 0 0 0 3px rgba(0,102,204,.15); }
  .controls { display: flex; gap: 12px; align-items: end; flex-wrap: wrap; }
  .controls select, .controls input { padding: 8px 12px; border: 1px solid #dee2e6; border-radius: 6px; font-size: 13px; background: #fff; cursor: pointer; }
  .controls button { padding: 8px 24px; background: #0066cc; color: #fff; border: none; border-radius: 6px; font-size: 14px; font-weight: 500; cursor: pointer; }
  .controls button:hover { background: #0052a3; }
  .controls button:disabled { opacity: .5; cursor: not-allowed; }
  .controls .field { display: flex; flex-direction: column; gap: 4px; }

  /* Upload Zone */
  .upload-zone { border: 2px dashed #dee2e6; border-radius: 8px; padding: 24px; text-align: center; cursor: pointer; margin-bottom: 12px; transition: all .2s; }
  .upload-zone:hover, .upload-zone.dragover { border-color: #0066cc; background: #f0f7ff; }
  .upload-zone p { font-size: 13px; color: #868e96; }
  .upload-zone .icon { font-size: 28px; margin-bottom: 8px; }

  /* Custom 提取模板 */
  .schema-row { display: flex; gap: 8px; margin-bottom: 8px; align-items: center; }
  .schema-row input { flex: 1; padding: 6px 10px; border: 1px solid #dee2e6; border-radius: 4px; font-size: 13px; }
  .schema-row input:focus { outline: none; border-color: #0066cc; }
  .schema-row .remove-btn { background: none; border: 1px solid #ffc9c9; color: #c92a2a; border-radius: 4px; padding: 4px 10px; cursor: pointer; font-size: 13px; }
  .schema-row .remove-btn:hover { background: #fff5f5; }
  #custom提取模板字段 { margin-bottom: 12px; }
  .btn-secondary { background: #868e96 !important; }
  .btn-secondary:hover { background: #495057 !important; }
  .btn-outline { background: #fff !important; color: #0066cc !important; border: 1px solid #0066cc !important; }
  .btn-outline:hover { background: #f0f7ff !important; }
  .btn-sm { padding: 6px 16px !important; font-size: 12px !important; }
  .custom-schema-box { display: none; margin-top: 8px; padding: 12px; background: #f8f9fa; border-radius: 6px; border: 1px solid #e9ecef; }
  .custom-schema-box.show { display: block; }

  /* 管道 Steps */
  #pipelineSteps { margin-bottom: 16px; display: none; }
  #pipelineSteps.show { display: block; }
  .step-row { display: flex; align-items: center; gap: 12px; padding: 8px 0; border-bottom: 1px solid #f1f3f5; }
  .step-row:last-child { border-bottom: none; }
  .step-icon { width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; flex-shrink: 0; }
  .step-icon.waiting { background: #e9ecef; color: #868e96; }
  .step-icon.running { background: #fff3bf; color: #e67700; animation: pulse 0.8s infinite; }
  .step-icon.done { background: #d3f9d8; color: #2b8a3e; }
  .step-icon.error { background: #ffe3e3; color: #c92a2a; }
  .step-name { font-size: 13px; color: #495057; flex: 1; }
  .step-detail { font-size: 11px; color: #868e96; }
  .step-status-icon { font-size: 13px; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }

  /* Results */
  .summary-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 16px; }
  .summary-item { background: #f8f9fa; border-radius: 6px; padding: 12px; text-align: center; }
  .summary-item .num { font-size: 24px; font-weight: 700; color: #0066cc; }
  .summary-item .label { font-size: 11px; color: #868e96; text-transform: uppercase; letter-spacing: .5px; }
  .card { border: 1px solid #e9ecef; border-radius: 6px; padding: 12px; margin-bottom: 8px; }
  .card-title { font-weight: 600; font-size: 13px; color: #0066cc; margin-bottom: 4px; }
  .card-field { font-size: 13px; color: #495057; }
  .card-field b { color: #1a1a2e; }
  .answer-box { background: #f0f7ff; border: 1px solid #cce5ff; border-radius: 6px; padding: 16px; margin-top: 16px; }
  .answer-box p { font-size: 14px; line-height: 1.6; }
  .citation { color: #0066cc; font-size: 13px; margin-right: 8px; }
  .empty-state { color: #868e96; font-size: 14px; text-align: center; padding: 32px 0; }
  .error { background: #fff5f5; border: 1px solid #ffc9c9; color: #c92a2a; border-radius: 6px; padding: 16px; }
  .success-msg { background: #d3f9d8; border: 1px solid #b2f2bb; color: #2b8a3e; border-radius: 6px; padding: 8px 12px; font-size: 13px; margin-bottom: 8px; display: none; }
  .filename-badge { display: inline-block; background: #e9ecef; border-radius: 4px; padding: 2px 8px; font-size: 12px; margin-bottom: 8px; color: #495057; }
  @media (max-width: 768px) { .container { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<div class="header">
  <div>
    <h1>LitePaperReader 数据流引擎</h1>
    <p>通用数据流智能管道 &mdash; input &rarr; adapters &rarr; extraction &rarr; answer</p>
  </div>
  <div style="font-size:12px;opacity:0.6" id="statusBadge">dis已连接</div>
</div>
<div class="tabs" id="mainTabs">
  <button class="tab active" onclick="switchTab('input')">输入</button>
  <button class="tab" onclick="switchTab('schema')">模板构建</button>
</div>
<div class="container" id="mainContainer">
  <!-- LEFT COLUMN -->
  <div>
    <!-- 输入 Tab Content -->
    <div class="tab-content active" id="tab-input">
      <div class="panel" style="border-radius:0 0 8px 8px">
        <h2>输入</h2>
        <div class="upload-zone" id="uploadZone" onclick="document.getElementById('file输入').click()">
          <div class="icon">&#128196;</div>
          <p>拖拽文件到此处，或点击选择</p>
          <p style="font-size:11px;color:#adb5bd;margin-top:4px">支持 .txt .md .html .csv .py .js .pdf 格式</p>
          <input type="file" id="file输入" hidden onchange="handleFile(this)">
        </div>
        <div id="fileInfo" style="display:none"></div>
        <textarea id="inputText" placeholder="在此粘贴文本内容...&#10;&#10;例如：本文提出了一种新的深度学习方法 a novel deep learning method for image recognition."></textarea>
        <div class="controls">
          <div class="field">
            <label>提取模板</label>
            <select id="templateSelect" onchange="onTemplateChange()">
              <option value="paper">学术论文</option>
              <option value="person">人物简介</option>
              <option value="product">产品描述</option>
              <option value="__custom__">Custom...</option>
            </select>
          </div>
          <div class="field">
            <label>模式</label>
            <select id="modeSelect">
              <option value="mock">模拟模式（无需模型）</option>
              <option value="ollama">Ollama 本地模型</option>
            </select>
          </div>
          <button id="processBtn" onclick="process()">开始处理</button>
        </div>
        <!-- Custom schema inline -->
        <div class="custom-schema-box" id="custom提取模板Box">
          <div style="font-size:13px;font-weight:500;margin-bottom:8px;color:#495057">Custom 提取模板 字段</div>
          <div id="custom提取模板字段">
            <div class="schema-row">
              <input class="sf-name" placeholder="字段名（如：作者）" style="flex:1">
              <input class="sf-desc" placeholder="字段描述（如：第一作者）" style="flex:2">
              <button class="remove-btn" onclick="remove提取模板Row(this)">&times;</button>
            </div>
          </div>
          <div style="display:flex;gap:8px;flex-wrap:wrap">
            <button class="btn-outline btn-sm" onclick="add提取模板Row()">+ 添加字段</button>
            <button class="btn-sm" onclick="registerCustom提取模板()">Register 提取模板</button>
          </div>
          <div id="schemaMsg" class="success-msg"></div>
        </div>
      </div>
    </div>
    <!-- 模板构建 Tab -->
    <div class="tab-content" id="tab-schema">
      <div class="panel" style="border-radius:0 0 8px 8px">
        <h2>模板构建</h2>
        <p style="font-size:13px;color:#868e96;margin-bottom:16px">无需编写代码，定义自定义提取模板。</p>
        <div class="field" style="margin-bottom:12px">
          <label>模板名称</label>
          <input type="text" id="schemaTmplName" placeholder="例如：会议记录" style="width:100%;padding:8px 12px;border:1px solid #dee2e6;border-radius:6px;font-size:13px">
        </div>
        <div class="field" style="margin-bottom:12px">
          <label>Description</label>
          <input type="text" id="schemaTmplDesc" placeholder="例如：会议纪要模板" style="width:100%;padding:8px 12px;border:1px solid #dee2e6;border-radius:6px;font-size:13px">
        </div>
        <div style="font-size:13px;font-weight:500;margin-bottom:8px;color:#495057">字段</div>
        <div id="schemaBuilder字段">
          <div class="schema-row">
            <input class="sf-name" placeholder="Field name" style="flex:1">
            <input class="sf-desc" placeholder="Description" style="flex:2">
            <button class="remove-btn" onclick="remove提取模板Row(this)">&times;</button>
          </div>
        </div>
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          <button class="btn-outline btn-sm" onclick="add提取模板RowBuilder()">+ 添加字段</button>
          <button class="btn-sm" onclick="registerCustom提取模板FromBuilder()">Register &amp; Use</button>
        </div>
        <div id="schemaBuilderMsg" class="success-msg"></div>
        <div style="margin-top:16px;padding-top:16px;border-top:1px solid #e9ecef">
          <div style="font-size:13px;font-weight:500;margin-bottom:8px;color:#495057">已注册模板</div>
          <div id="templateList" style="font-size:13px;color:#868e96">Loading...</div>
        </div>
      </div>
    </div>
  </div>
  <!-- RIGHT COLUMN -->
  <div>
    <div class="panel" style="border-radius:8px">
      <h2>管道</h2>
      <div id="pipelineSteps">
        <div class="step-row" data-step="adapter"><div class="step-icon waiting">1</div><span class="step-name">格式转换</span><span class="step-detail"></span></div>
        <div class="step-row" data-step="splitter"><div class="step-icon waiting">2</div><span class="step-name">文本切分</span><span class="step-detail"></span></div>
        <div class="step-row" data-step="extractor"><div class="step-icon waiting">3</div><span class="step-name">提取模板Extractor</span><span class="step-detail"></span></div>
        <div class="step-row" data-step="answer"><div class="step-icon waiting">4</div><span class="step-name">回答生成</span><span class="step-detail"></span></div>
      </div>
      <div id="results">
        <div class="empty-state">Enter text or drop a file, then click 开始处理.</div>
      </div>
    </div>
  </div>
</div>
<script>
// === Tab switching ===
let currentTab = 'input';
function switchTab(name) {
  currentTab = name;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.querySelector('.tab[onclick*="'+name+'"]')?.classList.add('active');
  document.getElementById('tab-'+name)?.classList.add('active');
}

// === 提取模板 row helpers ===
function add提取模板Row() {
  const c = document.getElementById('custom提取模板字段');
  const row = document.createElement('div'); row.className = 'schema-row';
  row.innerHTML = '<input class="sf-name" placeholder="Field name" style="flex:1"><input class="sf-desc" placeholder="Description" style="flex:2"><button class="remove-btn" onclick="remove提取模板Row(this)">&times;</button>';
  c.appendChild(row);
}
function remove提取模板Row(btn) { btn.closest('.schema-row').remove(); }
function add提取模板RowBuilder() {
  const c = document.getElementById('schemaBuilder字段');
  const row = document.createElement('div'); row.className = 'schema-row';
  row.innerHTML = '<input class="sf-name" placeholder="Field name" style="flex:1"><input class="sf-desc" placeholder="Description" style="flex:2"><button class="remove-btn" onclick="remove提取模板Row(this)">&times;</button>';
  c.appendChild(row);
}

// === Custom 提取模板 (from 输入 tab) ===
function onTemplateChange() {
  const sel = document.getElementById('templateSelect');
  document.getElementById('custom提取模板Box').classList.toggle('show', sel.value === '__custom__');
}

async function registerCustom提取模板() {
  const name = 'custom_' + Date.now();
  const fields = [];
  document.querySelectorAll('#custom提取模板字段 .schema-row').forEach(row => {
    const n = row.querySelector('.sf-name').value.trim();
    const d = row.querySelector('.sf-desc').value.trim();
    if (n) fields.push({name: n, description: d || n});
  });
  if (!fields.length) { show提取模板Msg('Please add at least one field.', false); return; }
  try {
    const resp = await fetch('/schema', { method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({template_id: name, description: 'Custom template', fields: fields}) });
    const data = await resp.json();
    if (data.success) {
      show提取模板Msg('提取模板 "'+name+'" registered! Select it above.', true);
      const sel = document.getElementById('templateSelect');
      sel.insertAdjacentHTML('beforebegin', '<option value="'+name+'" selected>'+name+'</option>');
      // Remove the __custom__ option
      const opt = sel.querySelector('option[value="__custom__"]');
      if (opt) { sel.removeChild(opt); }
      document.getElementById('custom提取模板Box').classList.remove('show');
    } else {
      show提取模板Msg('错误: '+(data.error||'unknown'), false);
    }
  } catch(e) { show提取模板Msg('错误: '+e.message, false); }
}
function show提取模板Msg(msg, ok) {
  const el = document.getElementById('schemaMsg');
  el.textContent = msg; el.style.display = 'block'; el.style.background = ok ? '#d3f9d8' : '#fff5f5'; el.style.color = ok ? '#2b8a3e' : '#c92a2a';
  setTimeout(() => el.style.display = 'none', 3000);
}

// === 模板构建 (模板构建 tab) ===
async function registerCustom提取模板FromBuilder() {
  const name = document.getElementById('schemaTmplName').value.trim();
  const desc = document.getElementById('schemaTmplDesc').value.trim() || name;
  if (!name) { showBuilderMsg('Please enter a template name.', false); return; }
  const fields = [];
  document.querySelectorAll('#schemaBuilder字段 .schema-row').forEach(row => {
    const n = row.querySelector('.sf-name').value.trim();
    const d = row.querySelector('.sf-desc').value.trim();
    if (n) fields.push({name: n, description: d || n});
  });
  if (!fields.length) { showBuilderMsg('Please add at least one field.', false); return; }
  try {
    const resp = await fetch('/schema', { method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({template_id: name, description: desc, fields: fields}) });
    const data = await resp.json();
    if (data.success) {
      showBuilderMsg('提取模板 "'+name+'" registered! Switch to 输入 tab and select it.', true);
      loadTemplateList();
    } else {
      showBuilderMsg('错误: '+(data.error||'unknown'), false);
    }
  } catch(e) { showBuilderMsg('错误: '+e.message, false); }
}
function showBuilderMsg(msg, ok) {
  const el = document.getElementById('schemaBuilderMsg');
  el.textContent = msg; el.style.display = 'block'; el.style.background = ok ? '#d3f9d8' : '#fff5f5'; el.style.color = ok ? '#2b8a3e' : '#c92a2a';
  setTimeout(() => el.style.display = 'none', 3000);
}
async function loadTemplateList() {
  try {
    const resp = await fetch('/templates');
    const data = await resp.json();
    const el = document.getElementById('templateList');
    if (data.templates && data.templates.length) {
      el.innerHTML = data.templates.map(t => '<span style="display:inline-block;background:#e9ecef;border-radius:4px;padding:2px 8px;margin:2px;font-size:12px">'+t+'</span>').join('');
    } else { el.textContent = 'No templates registered.'; }
  } catch(e) { document.getElementById('templateList').textContent = '错误 loading.'; }
}

// === File Upload ===
const uploadZone = document.getElementById('uploadZone');
uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.classList.add('dragover'); });
uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('dragover'));
uploadZone.addEventListener('drop', e => { e.preventDefault(); uploadZone.classList.remove('dragover'); if(e.dataTransfer.files.length) handleFileObj(e.dataTransfer.files[0]); });

function handleFile(input) { if(input.files.length) handleFileObj(input.files[0]); input.value=''; }
function handleFileObj(file) {
  document.getElementById('fileInfo').style.display = 'block';
  document.getElementById('fileInfo').innerHTML = '<span class="filename-badge">'+file.name+' ('+(file.size/1024).toFixed(1)+' KB)</span>';
  const reader = new FileReader();
  reader.onload = function(e) {
    let text = e.target.result;
    // If it's a binary-ish file, try to read first few bytes for detection
    document.getElementById('inputText').value = text.substring(0, 10000);
    // Auto-detect schema from filename
    const name = file.name.toLowerCase();
    if (name.endsWith('.py') || name.endsWith('.js') || name.endsWith('.rs')) {
      document.getElementById('templateSelect').value = 'paper';
    }
    document.getElementById('inputText').scrollTop = 0;
  };
  reader.readAsText(file);
}

// === 管道 开始处理ing ===
function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

async function process() {
  const btn = document.getElementById('processBtn');
  const stepsContainer = document.getElementById('pipelineSteps');
  const results = document.getElementById('results');
  const text = document.getElementById('inputText').value.trim();

  if (!text) { results.innerHTML = '<div class="empty-state">Please enter some text or upload a file.</div>'; return; }

  btn.disabled = true;
  stepsContainer.classList.add('show');

  // Reset steps
  document.querySelectorAll('.step-row').forEach(row => {
    row.querySelector('.step-icon').className = 'step-icon waiting';
    row.querySelector('.step-detail').textContent = '';
  });
  results.innerHTML = '';

  async function setStep(step, status, detail) {
    const row = document.querySelector('.step-row[data-step="'+step+'"]');
    if (!row) return;
    row.querySelector('.step-icon').className = 'step-icon ' + status;
    if (detail) row.querySelector('.step-detail').textContent = detail;
  }

  try {
    // Start request
    setStep('adapter', 'running', '格式转换中...');
    await sleep(200);

    const resp = await fetch('/process', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        text: text,
        template: document.getElementById('templateSelect').value,
        mode: document.getElementById('modeSelect').value,
      }),
    });

    setStep('adapter', 'done', 'ok');
    await sleep(150);
    setStep('splitter', 'running', '文本切分中...');
    await sleep(200);

    const data = await resp.json();

    if (data.error) {
      setStep('splitter', 'error', data.error);
      results.innerHTML = '<div class="error">错误: '+data.error+'</div>';
      return;
    }

    setStep('splitter', 'done', (data.metadata?.num_cells||0)+' cells');
    await sleep(150);
    setStep('extractor', 'running', '结构提取中...');
    await sleep(250);

    setStep('extractor', 'done', (data.cards?.length||0)+' cards');
    await sleep(150);
    setStep('answer', 'running', '回答生成中...');
    await sleep(300);
    setStep('answer', 'done', '完成');
    await sleep(200);

    // === Render Results ===
    const meta = data.metadata || {};
    const cards = data.cards || [];
    const answer = data.answer || {};

    const cardHtml = cards.map(c => {
      const fields = Object.entries(c.fields).filter(([k,v]) => v).map(([k,v]) => '<div class="card-field"><b>'+k+':</b> '+v+'</div>').join('');
      return '<div class="card"><div class="card-title">'+c.schema_id+' ('+c.source_cell_id+')</div>'+fields+'</div>';
    }).join('');

    const citations = (answer.citations||[]).map(c => '<span class="citation">['+c.cell_id+']</span> ').join('');

    results.innerHTML =
      '<div class="summary-grid">'+
        '<div class="summary-item"><div class="num">'+(meta.num_cells||0)+'</div><div class="label">数据单元</div></div>'+
        '<div class="summary-item"><div class="num">'+(meta.num_cards||0)+'</div><div class="label">提取卡片</div></div>'+
        '<div class="summary-item"><div class="num">'+(meta.resources||0)+'</div><div class="label">数据源</div></div>'+
      '</div>'+
      (cards.length ? '<div style="margin-bottom:16px"><div style="font-size:14px;font-weight:600;margin-bottom:8px;color:#495057;">提取结果</div>'+cardHtml+'</div>' : '')+
      '<div class="answer-box"><div style="font-size:14px;font-weight:600;margin-bottom:8px">回答</div>'+
        '<p>'+(answer.text||'暂无回答')+'</p>'+
        (citations ? '<p style="margin-top:8px;font-size:12px;color:#868e96">引用: '+citations+'</p>' : '')+
      '</div>';

  } catch (e) {
    results.innerHTML = '<div class="error">Request failed: '+e.message+'</div>';
    document.querySelectorAll('.step-row[data-step]').forEach(row => {
      if (row.querySelector('.step-icon').className === 'step-icon running') {
        row.querySelector('.step-icon').className = 'step-icon error';
      }
    });
  } finally {
    btn.disabled = false;
  }
}

// === Init ===
document.getElementById('statusBadge').textContent = '已连接';
loadTemplateList();
</script>
</body>
</html>
